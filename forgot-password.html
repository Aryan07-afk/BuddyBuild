<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BuddyBuild — Forgot Password</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
    <div class="grid-overlay"></div>
  </div>

  <header class="auth-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
      </svg>
      <span class="logo-text">BuddyBuild</span>
    </div>
    <nav class="auth-nav">
      <a href="login.html" class="nav-link">Login</a>
      <a href="register.html" class="nav-link">Register</a>
    </nav>
  </header>

  <main class="auth-main centered">
    <div class="auth-card" style="width: 100%; max-width: 480px; margin: 0 auto;">
      <div class="form-panel active" id="forgot-panel">
        <div class="card-header">
          <h2>Reset password</h2>
          <p>Enter your email to receive a reset link</p>
        </div>

        <form class="auth-form" id="forgot-form">
          <div class="field-group">
            <label>Email</label>
            <div class="input-wrap">
              <span class="input-icon">✉</span>
              <input type="email" id="forgot-email" placeholder="you@university.edu" required />
            </div>
          </div>

          <button type="submit" class="btn-primary" id="btn-forgot">
            Send Reset Link <span class="btn-arrow">→</span>
          </button>
        </form>

        <div class="switch-auth">
          Remembered your password?
          <a href="login.html">Back to sign in</a>
        </div>
      </div>

      <!-- SUCCESS PANEL -->
      <div class="form-panel" id="success-panel">
        <div class="card-header" style="text-align: center;">
          <div class="status-icon" style="font-size: 3rem; margin-bottom: 1rem;">📧</div>
          <h2>Check your email</h2>
          <p>We've sent a password reset link to <strong id="sent-email-display">your email</strong>. Please check your inbox.</p>
        </div>
        <div class="switch-auth" style="margin-top: 2rem;">
          <a href="login.html" class="btn-outline" style="display: block; width: 100%; text-align: center;">Back to login</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
