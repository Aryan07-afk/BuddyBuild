<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BuddyBuild — Reset Password</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
    <div class="grid-overlay"></div>
  </div>

  <main class="auth-main centered">
    <div class="auth-card" style="width: 100%; max-width: 480px; margin: 0 auto;">
      <div class="form-panel active" id="reset-panel">
        <div class="card-header">
          <h2>Create new password</h2>
          <p>Please enter your new password below</p>
        </div>

        <form class="auth-form" id="reset-form">
          <div class="field-group">
            <label>New Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="reset-pass" placeholder="••••••••" required />
              <button type="button" class="toggle-pass" onclick="togglePass('reset-pass',this)">👁</button>
            </div>
          </div>
          <div class="field-group">
            <label>Confirm Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="reset-confirm" placeholder="••••••••" required />
            </div>
          </div>

          <button type="submit" class="btn-primary" id="btn-reset">
            Reset Password <span class="btn-arrow">→</span>
          </button>
        </form>
      </div>

      <!-- SUCCESS PANEL -->
      <div class="form-panel" id="reset-success-panel">
        <div class="card-header" style="text-align: center;">
          <div class="status-icon" style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
          <h2>Password reset</h2>
          <p>Your password has been successfully updated. You can now sign in with your new password.</p>
        </div>
        <div class="switch-auth" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
          <a href="login.html" class="btn-primary" style="display: block; width: 100%; text-align: center;">Go to Login</a>
          <a href="dashboard.html" class="btn-outline" style="display: block; width: 100%; text-align: center;">Go to Dashboard</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
