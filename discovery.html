<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BuddyBuild — Discover</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/discovery.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; display: inline-block; vertical-align: middle;"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
      <span class="logo-text">BuddyBuild</span>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="global-avatar-sidebar"></div>
      <div class="user-info">
        <span class="user-name"></span>
        <span class="user-role"></span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
      <a href="discovery.html" class="nav-item active"><span class="nav-icon">◎</span> Discover</a>
      <a href="requests.html" class="nav-item"><span class="nav-icon">⇄</span> Requests <span class="nav-badge" style="display:none;">0</span></a>
      <a href="profile.html" class="nav-item"><span class="nav-icon">◉</span> My Profile</a>
      <a href="my-team.html" class="nav-item"><span class="nav-icon">◈</span> My Team</a>
      <a href="ratings.html" class="nav-item"><span class="nav-icon">★</span> Ratings</a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" class="nav-item logout"><span class="nav-icon">⇦</span> Logout</a>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-left">
        <h1 class="page-title">Discover</h1>
        <span class="page-sub">Find your perfect teammate</span>
      </div>
    </header>

    <main class="page-content">

      <!-- SEARCH & FILTER BAR -->
      <div class="discover-controls">
        <div class="search-hero">
          <span class="sh-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search by name, skill, or section..." oninput="filterStudents()" />
          <button class="btn-clear" onclick="clearSearch()">✕</button>
        </div>

        <div class="filter-row">
          <span class="filter-label">Filter by skill:</span>
          <div class="filter-chips" id="filter-chips">
            <button class="chip active" data-skill="all" onclick="filterBySkill(this)">All</button>
            <button class="chip" data-skill="React" onclick="filterBySkill(this)">React</button>
            <button class="chip" data-skill="Python" onclick="filterBySkill(this)">Python</button>
            <button class="chip" data-skill="ML" onclick="filterBySkill(this)">ML</button>
            <button class="chip" data-skill="UI/UX" onclick="filterBySkill(this)">UI/UX</button>
            <button class="chip" data-skill="Node.js" onclick="filterBySkill(this)">Node.js</button>
            <button class="chip" data-skill="Flutter" onclick="filterBySkill(this)">Flutter</button>
            <button class="chip" data-skill="Java" onclick="filterBySkill(this)">Java</button>
            <button class="chip" data-skill="DevOps" onclick="filterBySkill(this)">DevOps</button>
          </div>

          <div class="filter-selects">
            <select onchange="filterStudents()" id="sem-filter">
              <option value="">All Semesters</option>
              <option>Sem 3</option><option>Sem 4</option>
              <option>Sem 5</option><option>Sem 6</option>
            </select>
            <select onchange="filterStudents()" id="status-filter">
              <option value="">All Status</option>
              <option value="solo">Solo</option>
              <option value="looking">Looking</option>
            </select>
          </div>
        </div>

        <div class="results-info">
          <span id="results-count">Showing 0 students</span>
          <div class="view-toggle">
            <button class="vt active" id="grid-view" onclick="setView('grid', this)">⊞</button>
            <button class="vt" id="list-view" onclick="setView('list', this)">≡</button>
          </div>
        </div>
      </div>

      <!-- STUDENT CARDS GRID -->
      <div class="cards-grid" id="cards-container">

        <!-- Smart Card Template — rendered by JS -->

      </div>

      <!-- EMPTY STATE -->
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="es-icon">◎</div>
        <h3>No students found</h3>
        <p>Try adjusting your search or filters</p>
        <button onclick="clearSearch()" class="btn-primary">Clear Filters</button>
      </div>

    </main>
  </div>

  <!-- PROFILE MODAL -->
  <div class="modal-overlay" id="profile-modal" onclick="closeModal(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeProfileModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/discovery.js"></script>
</body>
</html>
