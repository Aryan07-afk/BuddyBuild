<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BuddyBuild — Ratings</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/ratings.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; display: inline-block; vertical-align: middle;"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg><span class="logo-text">BuddyBuild</span></div>
    <div class="sidebar-user">
      <div class="user-avatar" id="global-avatar-sidebar"></div>
      <div class="user-info"><span class="user-name"></span><span class="user-role"></span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
      <a href="discovery.html" class="nav-item"><span class="nav-icon">◎</span> Discover</a>
      <a href="requests.html" class="nav-item"><span class="nav-icon">⇄</span> Requests <span class="nav-badge" style="display:none;">0</span></a>
      <a href="profile.html" class="nav-item"><span class="nav-icon">◉</span> My Profile</a>
      <a href="my-team.html" class="nav-item"><span class="nav-icon">◈</span> My Team</a>
      <a href="ratings.html" class="nav-item active"><span class="nav-icon">★</span> Ratings</a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" class="nav-item logout"><span class="nav-icon">⇦</span> Logout</a>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="topbar-left">
        <h1 class="page-title">Ratings</h1>
        <span class="page-sub">Rate teammates & view your scores</span>
      </div>
    </header>

    <main class="page-content">

      <!-- MY RATING OVERVIEW -->
      <div class="rating-overview">
        <div class="ro-score-big">
          <div class="rob-num">0.0</div>
          <div class="rob-stars"></div>
          <div class="rob-label">Overall Rating</div>
          <div class="rob-sub">No reviews yet</div>
        </div>
        <div class="ro-breakdown">
          <div class="rob-item">
            <span class="rob-cat">Teamwork</span>
            <div class="rob-bar-wrap">
              <div class="rob-bar"><div class="rob-fill" style="width:0%"></div></div>
              <span class="rob-val">0.0</span>
            </div>
          </div>
          <div class="rob-item">
            <span class="rob-cat">Punctuality</span>
            <div class="rob-bar-wrap">
              <div class="rob-bar"><div class="rob-fill" style="width:0%"></div></div>
              <span class="rob-val">0.0</span>
            </div>
          </div>
          <div class="rob-item">
            <span class="rob-cat">Technicality</span>
            <div class="rob-bar-wrap">
              <div class="rob-bar"><div class="rob-fill" style="width:0%"></div></div>
              <span class="rob-val">0.0</span>
            </div>
          </div>
          <div class="rob-item">
            <span class="rob-cat">Communication</span>
            <div class="rob-bar-wrap">
              <div class="rob-bar"><div class="rob-fill" style="width:0%"></div></div>
              <span class="rob-val">0.0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- RATE TEAMMATES -->
      <div class="section-card">
        <div class="sc-head">
          <h3>Rate Your Teammates</h3>
          <span class="sc-sub" id="current-project-ref">No active project</span>
        </div>

        <div class="rate-teammates-list" id="teammates-to-rate-list">
        </div>
      </div>

      <!-- RECEIVED RATINGS -->
      <div class="section-card">
        <div class="sc-head"><h3>Ratings You Received</h3></div>
        <div class="received-ratings" id="received-ratings-list">
        </div>
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/ratings.js"></script>
</body>
</html>
